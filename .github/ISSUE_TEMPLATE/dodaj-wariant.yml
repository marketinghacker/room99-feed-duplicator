name: Dodaj wariant tytulu
description: Dodaj nowy duplikat z innym tytulem do feedu Google Shopping
title: "[WARIANT] "
labels:
  - new-variant
body:
  - type: markdown
    attributes:
      value: |
        ## Wypelnij 4 pola i kliknij Submit

        Po submission:
        1. Skrypt **automatycznie doda regule** do config.json
        2. **Feed sie zregeneruje** w ciagu 1h (lub uruchom workflow recznie)
        3. **Ten issue zostanie zamkniety** z potwierdzeniem

        ---

  - type: input
    id: match_in_title
    attributes:
      label: Grupa produktow
      description: |
        Skrypt znajdzie WSZYSTKIE produkty ktorych tytul zawiera ten string (case-insensitive).
        Przyklady ktore masz w katalogu Room99 - wpisz dokladnie:
        - GARDEN LINE (72 produkty - zaslony ogrodowe)
        - MARSHMALLOW (poszewki dekoracyjne)
        - BIANCA (zaslony welurowe)
      placeholder: GARDEN LINE
    validations:
      required: true

  - type: input
    id: search_in_title
    attributes:
      label: Szukaj w tytule
      description: |
        Tekst ktory zostanie zastapiony w tytule duplikatu.
        Np. jesli oryginalny title = "ZASLONA NA TARAS GARDEN LINE - Bezowa", a tu wpiszesz "ZASLONA NA TARAS",
        to w duplikacie ten fragment bedzie podmieniony.
      placeholder: ZASLONA NA TARAS
    validations:
      required: true

  - type: input
    id: replace_with
    attributes:
      label: Zastap przez
      description: |
        Nowy tekst ktory pojawi sie w tytule duplikatu zamiast 'Szukaj w tytule'.
        Pomysly dla testow A/B/C:
        - ZASLONA NIEPRZEMAKALNA
        - ZASLONA DO ALTANY
        - MARKIZA OGRODOWA
      placeholder: ZASLONA DO ALTANY
    validations:
      required: true

  - type: input
    id: dup_suffix
    attributes:
      label: Sufiks ID
      description: |
        Zostanie dodany do `id` duplikata (np. `9491` -> `9491_t6`) oraz do `custom_label_1`
        zebys mogl segmentowac w Google Ads.
        Uzywaj **krotkich** nazw bez spacji: t1, t2, m1, b1, etc.
        Sprawdz w config.json ze nie koliduje z istniejacymi sufiksami.
      placeholder: t6
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notatka
      description: Po co testujesz ten wariant? Hipoteza? Source keywordu?
      placeholder: |
        Hipoteza: konkurenci uzywaja "ZASLONA NA TARASU" - sprawdzamy czy SEO bardziej lubi te forme.
    validations:
      required: false
