name: ➕ Dodaj wariant tytułu
description: Dodaj nowy duplikat z innym tytułem do feedu Google Shopping
title: "[WARIANT] "
labels:
  - new-variant
body:
  - type: markdown
    attributes:
      value: |
        ## Wypełnij 4 pola i kliknij Submit

        Po submission:
        1. Skrypt **automatycznie doda regułę** do config.json
        2. **Feed się zregeneruje** w ciągu 1h (lub uruchom workflow ręcznie)
        3. **Ten issue zostanie zamknięty** z potwierdzeniem

        ---

  - type: input
    id: match_in_title
    attributes:
      label: 🎯 Grupa produktów (Match w tytule)
      description: |
        Skrypt znajdzie WSZYSTKIE produkty których tytuł zawiera ten string (case-insensitive).
        Przykłady które masz w katalogu Room99 — wpisz dokładnie:
        - `GARDEN LINE` (72 produkty — zasłony ogrodowe)
        - `MARSHMALLOW` (poszewki dekoracyjne)
        - `BIANCA` (zasłony welurowe)
      placeholder: GARDEN LINE
    validations:
      required: true

  - type: input
    id: search_in_title
    attributes:
      label: 🔍 Szukaj w tytule
      description: |
        Tekst który zostanie zastąpiony w tytule duplikatu.
        Np. jeśli oryginalny title = "ZASŁONA NA TARAS GARDEN LINE - Beżowa", a tu wpiszesz "ZASŁONA NA TARAS",
        to w duplikacie ten fragment będzie podmieniony.
      placeholder: ZASŁONA NA TARAS
    validations:
      required: true

  - type: input
    id: replace_with
    attributes:
      label: ✏️ Zastąp przez
      description: |
        Nowy tekst który pojawi się w tytule duplikatu zamiast 'Szukaj w tytule'.
        Pomysły dla testów A/B/C:
        - `ZASŁONA NIEPRZEMAKALNA`
        - `ZASŁONA DO ALTANY`
        - `MARKIZA OGRODOWA`
      placeholder: ZASŁONA DO ALTANY
    validations:
      required: true

  - type: input
    id: dup_suffix
    attributes:
      label: 🏷️ Identyfikator wariantu (krótki, unikalny)
      description: |
        Zostanie dodany do `id` duplikata (np. `9491` → `9491_t6`) oraz do `custom_label_1`
        żebyś mógł segmentować w Google Ads.
        Używaj **krótkich** nazw bez spacji: t1, t2, m1, b1, etc.
        Sprawdź w config.json że nie kolizjonuje z istniejącymi sufiksami.
      placeholder: t6
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 📝 Notatka (opcjonalna)
      description: Po co testujesz ten wariant? Hipoteza? Source keywordu?
      placeholder: |
        Hipoteza: konkurenci używają "ZASŁONA NA TARASU" — sprawdzamy czy SEO bardziej lubi tę formę.
    validations:
      required: false
